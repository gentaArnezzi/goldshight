name: Daily OOS Pipeline

on:
  schedule:
    # Mon-Fri at 23:00 UTC (06:00 WIB next day)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  inference:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r ml-pipeline/requirements.txt

      - name: Run inference pipeline
        run: python ml-pipeline/infer.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet web/src/data/oos_2026.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/src/data/oos_2026.json
          git commit -m "chore: update OOS 2026 predictions [$(date -u +%Y-%m-%d)]"
          git push
